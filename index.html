<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-3D Interactive Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0?dev",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime?dev",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev&deps=react@18.2.0",
            "lucide-react": "https://esm.sh/lucide-react@0.454.0?dev&deps=react@18.2.0",
            "three": "https://esm.sh/three@0.160.0"
        }
    }
    </script>
    <style>
        body, html, #root { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #050505;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        /* Custom scrollbar for the menu */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" src="./src/main.tsx"></script>
</body>
</html>
